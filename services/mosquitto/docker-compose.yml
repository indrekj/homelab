services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    restart: unless-stopped
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - homelab
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M

networks:
  homelab:
    external: true
