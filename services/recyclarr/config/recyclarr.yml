# yaml-language-server: $schema=https://schemas.recyclarr.dev/v8/config-schema.json
#
# Recyclarr configuration. Reaches Radarr/Sonarr over the homelab network by
# container name; API keys come from the environment (set in the root .env).
#
# As of Recyclarr v8 the official repo no longer ships includable templates, so
# the TRaSH-Guides profiles are inlined below (copied from the bundled
# `uhd-bluray-web` / `hd-bluray-web` / `web-1080p` / `web-2160p` templates).
# Each instance carries two profiles so individual movies/shows can opt into the
# other resolution. trash_ids are resolved against the guides at sync time; each
# profile's trash_id supplies its own per-format scores. The custom_format_groups
# block is the union of both profiles' groups (a CF unused by one profile just
# scores 0 there). See https://trash-guides.info to add more.

radarr:
  # Instance names must be unique across ALL services in one config (v8), so
  # this is `movies`, not `main` — a Sonarr `main` would silently collide and
  # make the whole sync no-op.
  movies:
    base_url: http://radarr:7878
    api_key: !env_var RADARR_API_KEY

    quality_definition:
      type: movie

    quality_profiles:
      # Default for movies. Stock UHD Bluray + WEB only enables 2160p; we append
      # the 1080p tiers below so it grabs 4K when available and falls back to
      # 1080p otherwise. Cutoff stays at Bluray-2160p, so a 1080p grab is left
      # "below cutoff" and keeps getting upgraded toward 4K. trash_id still
      # supplies the custom-format scores.
      - trash_id: 64fb5f9858489bdac2af690e27c8f42f  # UHD Bluray + WEB (+1080p fallback)
        reset_unmatched_scores:
          enabled: true
        upgrade:
          allowed: true
          until_quality: Bluray-2160p
          until_score: 10000
        qualities:
          - name: Bluray-2160p
          - name: WEB 2160p
            qualities:
              - WEBRip-2160p
              - WEBDL-2160p
          - name: Bluray-1080p
          - name: WEB 1080p
            qualities:
              - WEBRip-1080p
              - WEBDL-1080p
      - trash_id: d1d67249d3890e49bc12e275d989a7e9  # HD Bluray + WEB (1080p cap, opt-in per movie)
        reset_unmatched_scores:
          enabled: true

    custom_format_groups:
      add:
        - trash_id: ff204bbcecdd487d1cefcefdbf0c278d  # [Optional] Golden Rule UHD
          select:
            - 839bea857ed2c0a8e084f3cbdbd65ecb  # x265 (no HDR/DV)
        - trash_id: f8bf8eab4617f12dfdbd16303d8da245  # [Optional] Golden Rule HD
          select:
            - dc98083864ea246d05a42df0d05f81cc  # x265 (HD)
        - trash_id: a3ac6af01d78e4f21fcb75f601ac96df  # [Unwanted] Unwanted Formats
          select:
            - b8cd450cbfa689c0259a01d9e29ba3d6  # 3D
            - cae4ca30163749b891686f95532519bd  # AV1
            - b6832f586342ef70d9c128d40c07b872  # Bad Dual Groups
            - cc444569854e9de0b084ab2b8b1532b2  # Black and White Editions
            - ed38b889b31be83fda192888e2286d83  # BR-DISK
            - 0a3f082873eb454bde444150b70253cc  # Extras
            - e6886871085226c3da1830830146846c  # Generated Dynamic HDR
            - 90a6f9a284dff5103f6346090e6280c8  # LQ
            - e204b80c87be9497a8a6eaff48f72905  # LQ (Release Title)
            - 712d74cd88bceb883ee32f773656b1f5  # Sing-Along Versions
            - bfd8eb01832d646a0a89c4deb46f8564  # Upscaled

sonarr:
  series:
    base_url: http://sonarr:8989
    api_key: !env_var SONARR_API_KEY

    quality_definition:
      type: series

    quality_profiles:
      - trash_id: 72dae194fc92bf828f32cde7744e51a1  # WEB-1080p   (default for series)
        reset_unmatched_scores:
          enabled: true
      - trash_id: d1498e7d189fbe6c7110ceaabb7473e6  # WEB-2160p   (4K, opt-in per show)
        reset_unmatched_scores:
          enabled: true

    custom_format_groups:
      add:
        - trash_id: 158188097a58d7687dee647e04af0da3  # [Optional] Golden Rule HD
          select:
            - 47435ece6b99a0b477caf360e79ba0bb  # x265 (HD)
        - trash_id: e3f37512790f00d0e89e54fe5e790d1c  # [Optional] Golden Rule UHD
          select:
            - 9b64dff695c2115facf1b6ea59c9bd07  # x265 (no HDR/DV)
        - trash_id: 85fae4a2294965b75710ef2989c850eb  # [Streaming Services] HD/UHD boost
          select:
            - 218e93e5702f44a68ad9e3c6ba87d2f0  # HD Streaming Boost
            - 43b3cf48cb385cd3eac608ee6bca7f09  # UHD Streaming Boost
        - trash_id: 59c3af66780d08332fdc64e68297098f  # [Unwanted] Unwanted Formats
          select:
            - 15a05bc7c1a36e2b57fd628f8977e2fc  # AV1
            - 32b367365729d530ca1c124a0b180c64  # Bad Dual Groups
            - 85c61753df5da1fb2aab6f2a47426b09  # BR-DISK
            - 6f808933a71bd9666531610cb8c059cc  # BR-DISK (BTN)
            - fbcb31d8dabd2a319072b84fc0b7249c  # Extras
            - 9c11cd3f07101cdba90a2d81cf0e56b4  # LQ
            - e2315f990da2e2cbfc9fa5b7a6fcfe48  # LQ (Release Title)
            - 23297a736ca77c0fc8e70f8edd7ee56c  # Upscaled
