nameOverride: plex

image:
  # Until https://github.com/plexinc/pms-docker/commit/85364963a51bfb9bd89327036f50a4e6f0479d70 is released
  tag: 1.41.6.9685-d301f511a

pms:
  configStorage: 3Gi

extraEnv:
  PLEX_CLAIM: ref+file://secrets.yaml#/plex/claimToken
  ALLOWED_NETWORKS: "172.16.0.0/12,10.0.0.0/8,192.168.0.0/16"

ingress:
  enabled: true
  ingressClassName: traefik
  annotations:
    cert-manager.io/issuer: letsencrypt
    traefik.ingress.kubernetes.io/router.tls: "true"
    traefik.ingress.kubernetes.io/router.entrypoints: websecure
  url: https://plex.urgas.eu
  tls:
    - hosts:
        - plex.urgas.eu
      secretName: urgas-eu-tls

extraVolumes:
  - name: media
    hostPath:
      path: /mnt/hdd-storage/media

extraVolumeMounts:
  - name: media
    mountPath: /media
    readOnly: true
